<p-toast />

<div class="flex items-center justify-between mb-2">
<div class="flex flex-col items-left justify-center pt-6  pl-6 ml-6">
  <h1 class="text-5xl font-bold opacity-80">Gestión de Políticas Deterministas</h1>

<p class="text-muted-color mt-2.5 opacity-90 text-gray-400 ">Configura y prioriza las reglas de control de acceso del gateway.</p>
</div>

<p-button
label="Nueva Política"
icon="pi pi-plus"
class="text-white border-none text-sm font-semibold px-4 py-2"
[style]="{'background-color': '#9d72ff'}"
></p-button>
</div>

<p-divider class="bg-[#252233]! mb-6"></p-divider>

<div class="flex justify-center items-center w-full h-full mt-6 pl-10 pr-10">
  <app-datagrid-policies class="w-full min-h-50" [columns]="column"  (paramsGrid)="OnParamsGrid($event)"
    [data]="data()" [totalRecords]="totalRecords()" [loading]="loading()" />
</div>
