<section class="flex flex-col bg-[#1A1726] border border-[#2F2B43] rounded-lg overflow-hidden w-full h-full ">

  <div class="p-4 border-b border-[#2F2B43] bg-[#1A1726] z-10">
    <h3 class="text-[#f3f3f6a7] font-semibold mt-0.5">Live Decision Logs</h3>
    <p class="text-[#aeaabdd2] text-[10px] mt-0.5"> Real-time gateway evaluation feed</p>
  </div>

  <div class="bg-[#110F18] flex-1">

    <p-scroll-panel [style]="{width: '100%', height: '297px'}" class="custom-scrollbar">

      <div class="p-4 font-mono text-xs flex flex-col gap-2">

        @for (log of livelogs(); track $index) {
        <div class="flex items-start sm:items-center gap-3 animate-fade-in">
          <span class="text-[#9A96A8] whitespace-nowrap opacity-80">
            {{log.time}}
          </span>

          <span class="px-2 py-0.5 rounded text-[10px] font-bold tracking-wider w-20 text-center shrink-0 border"
            [class]="log.colorClass">
            [{{log.verdict}}]
          </span>

          <span class="text-[#F3F3F6] break-all sm:break-normal">
            {{ log.serviceName }}
          </span>

        </div>
        }
        @if(livelogs().length === 0){
        <div class="text-[#9A96A8] italic opacity-50 flex items-center gap-2 mt-2">
          <i class="fa-solid fa-circle-notch fa-spin text-[10px]"></i>
          Listening for gateway events...
        </div>
        }
      </div>
    </p-scroll-panel>
  </div>
</section>
